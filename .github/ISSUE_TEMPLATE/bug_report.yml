name: Bug Report
description: Report a bug to help us improve
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        **Check for existing issues first**
        Before creating a new support request, please use the search function here in the Issues tracker to check if this problem or request has already been submitted.        
        Please also be sure to check the original [Nova-X Issues](https://github.com/darklinkpower/Nova-X) tracker. That theme has far more users, and your question may have already been answered there.
        
        If an issue exists, but has not been answered, **please do not create a new ticket**.
        Kindly keep in mind that *both* themes are single-developer projects.

        **Instructions**
        Change the placeholder title automatically filled in the template and provide the necessary details in the sections below. Fields marked with a * are required.
  - type: checkboxes
    attributes:
      label: Pre-Report Checklist
      description: Before submitting your report, please confirm the following
      options:
        - label: "I have serched existing issues (both open **and** closed, both here and at Nova-X) and confirm that this bug has not been addressed before."
          required: true
        - label: "I have confirmed that this bug does not exist in the base [Nova-X Theme](https://github.com/darklinkpower/Nova-X)."
          required: true
        - label: "This is not a feature request."
          required: true
  - type: textarea
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug and what behavior you expected instead.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: If the issue isn’t obvious from the description, please list the steps to reproduce the behavior. This is especially important for intermittent issues.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Extensions Log
      description: |
        If the issue caused Playnite to crash or is related to a theme error, please attach the **Extensions.log** file. 

        - For the portable version of Playnite, this file is located in the Playnite installation directory.
        - For the installed version, you can find it in **%AppData%\Playnite** (type this in the Explorer address bar).
    validations:
      required: false
  - type: textarea
    attributes:
      label: Screenshots
      description: Add screenshots or videos to help illustrate the issue, if applicable. These are particularly useful for UI or visual bugs.
    validations:
      required: false